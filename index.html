    <style>
        :root {
            --main-bg: #f8f9fa;
            --card-bg: #ffffff;
            --primary: #4a90e2;
            --accent: #f39c12;
            --success: #2ecc71;
            --text: #2c3e50;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--main-bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        #app {
            background: var(--card-bg);
            width: 90%;
            max-width: 500px;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { font-size: 1.8rem; color: var(--primary); margin-bottom: 1.5rem; }
        .hidden { display: none !important; }

        select, button {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 10px;
            border: 2px solid #eee;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            /* 48x48dp タッチターゲットの確保 */
            min-height: 48px; 
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }

        /* リップル風のホバーエフェクト */
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        .mode-btn-10 { background-color: var(--accent); margin-top: 10px; }
        .mode-btn-3m { background-color: var(--success); margin-top: 10px; }

        .label-text {
            text-align: left;
            font-size: 0.9rem;
            color: #7f8c8d;
            font-weight: bold;
            margin: 10px 0 5px 5px;
            display: block;
        }

        /* クイズ画面 */
        #stat-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-weight: bold;
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        #kanji-display {
            font-size: 6rem;
            margin: 1.5rem 0;
            color: var(--text);
            font-weight: bold;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .option-btn {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
            margin-bottom: 0;
        }

        .option-btn:hover {
            background: var(--primary);
            color: white;
        }

        #result-display { font-size: 2.5rem; color: var(--accent); margin: 1.5rem 0; font-weight: bold; }
    </style>
</head>

<div id="app">
    <div id="screen-home">
        <h1>めざせ！漢字マスター！</h1>
        
        <span class="label-text">学年をえらんでね</span>
        <select id="grade-select">
            <option value="1">小学1年生</option>
            <option value="2">小学2年生</option>
            <option value="3">小学3年生</option>
            <option value="4">小学4年生</option>
            <option value="5">小学5年生</option>
            <option value="6">小学6年生</option>
        </select>

        <span class="label-text">出題パターンをえらんでね</span>
        <select id="pattern-select">
            <option value="mix">音訓ミックス問題</option>
            <option value="on">音読み問題</option>
            <option value="kun_no_okurigana">訓読み問題（送り仮名なし）</option>
            <option value="kun_with_okurigana">訓読み問題（送り仮名あり）</option>
        </select>

        <button class="mode-btn-3m" onclick="startGame('3min')">3分間チャレンジ</button>
        <button class="mode-btn-10" onclick="startGame('10q')">10問タイムアタック</button>
    </div>

    <div id="screen-quiz" class="hidden">
        <div id="stat-bar">
            <span id="timer-text">タイム: 0.00</span>
            <span id="progress-text">1 / 10</span>
        </div>
        <div id="kanji-display">?</div>
        <div class="options-grid" id="options-container"></div>
        <!-- 追加: クイズ中断用のボタン -->
        <button onclick="goHome()" style="margin-top: 2rem; background-color: #e74c3c;">中断してホームにもどる</button>
    </div>

    <div id="screen-result" class="hidden">
        <h1>結果発表！</h1>
        <p id="result-label"></p>
        <div id="result-display"></div>
        <button onclick="goHome()">タイトルにもどる</button>
    </div>
</div>

    // onclickからのラッパー関数 (UIからパターンを取得してinitGameへ渡す)
    function startGame(mode) {
        const pattern = document.getElementById('pattern-select').value;
        initGame(mode, pattern);
        // Android/PWA向け: History APIを利用し、戻るボタンでホームに戻れるようにする
        history.pushState({ screen: 'quiz' }, '', '#quiz');
    }

    function initGame(mode, pattern) {
        const grade = document.getElementById('grade-select').value;
        currentGradeData = KANJI_MASTER_DATA[grade];
        currentGameMode = mode;
        currentPattern = pattern;
        
        // 選択された出題パターンに合致する「漢字と読みのペア」が存在するかチェック (フェールセーフ用として維持)
        availableQuestions = [];
        currentGradeData.forEach(kanjiData => {
            kanjiData.readings.forEach(r => {
                let isValid = false;
                if (currentPattern === 'kun_no_okurigana') isValid = (r.type === 'kun' && !r.hasOkurigana);
                else if (currentPattern === 'kun_with_okurigana') isValid = (r.type === 'kun' && r.hasOkurigana);
                else if (currentPattern === 'on') isValid = (r.type === 'on');
                else isValid = true; // mixの場合は全て

                if (isValid) {
                    availableQuestions.push({ k: kanjiData.k, r: r.text });
                }
            });
        });

        // 該当するデータが存在しない場合のフェールセーフ
        if (availableQuestions.length === 0) {
            alert("この学年には選択したパターンの漢字がありません。別のパターンを選んでください。");
            return;
        }

        document.getElementById('screen-home').classList.add('hidden');
        document.getElementById('screen-result').classList.add('hidden');
        document.getElementById('screen-quiz').classList.remove('hidden');

        qCount = 0;
        correctScore = 0;
        startTime = Date.now();

        if (mode === '3min') {
            run3MinTimer(180);
        } else {
            runStopwatch();
        }

        renderQuestion();
    }

    function renderQuestion() {
        if (currentGameMode === '10q' && qCount >= 10) {
            endGame();
            return;
        }

        // 選択された出題パターンに基づき、currentGradeDataから適切な漢字と読み（typeとtext）を抽出
        let validPairs = [];
        currentGradeData.forEach(kanjiData => {
            kanjiData.readings.forEach(r => {
                let isValid = false;
                if (currentPattern === 'kun_no_okurigana') isValid = (r.type === 'kun' && !r.hasOkurigana);
                else if (currentPattern === 'kun_with_okurigana') isValid = (r.type === 'kun' && r.hasOkurigana);
                else if (currentPattern === 'on') isValid = (r.type === 'on');
                else isValid = true; // mixの場合は全て

                if (isValid) {
                    validPairs.push({ k: kanjiData.k, text: r.text, type: r.type, hasOkurigana: r.hasOkurigana });
                }
            });
        });

        // 出題パターンに合致するリストからランダムにターゲットを決定
        const target = validPairs[Math.floor(Math.random() * validPairs.length)];
        document.getElementById('kanji-display').innerText = target.k;
        
        // 進行状況の更新 (改修箇所: 10問タイムアタックモード時の表示形式を要求通りに変更)
        if (currentGameMode === '10q') {
            document.getElementById('progress-text').innerText = `正解数: ${correctScore} / ${qCount + 1}`;
        } else {
            document.getElementById('progress-text').innerText = `正解数: ${correctScore}`;
        }

        // 選択肢の作成（正解と、出題パターンに適合する他の漢字の読みからダミーを抽出）
        let choices = [target.text];
        let others = validPairs.map(v => v.text).filter(t => t !== target.text);
        
        // 重複を排除してシャッフル
        others = [...new Set(others)].sort(() => Math.random() - 0.5);
        
        // もしダミー候補が足りない場合は、全学年のデータから同じ出題パターンの読みを補充する (安全策)
        if (others.length < 3) {
            let backupOthers = [];
            Object.values(KANJI_MASTER_DATA).forEach(gradeData => {
                gradeData.forEach(kanjiData => {
                    kanjiData.readings.forEach(r => {
                        let isValid = false;
                        if (currentPattern === 'kun_no_okurigana') isValid = (r.type === 'kun' && !r.hasOkurigana);
                        else if (currentPattern === 'kun_with_okurigana') isValid = (r.type === 'kun' && r.hasOkurigana);
                        else if (currentPattern === 'on') isValid = (r.type === 'on');
                        else isValid = true; 

                        if (isValid && r.text !== target.text) {
                            backupOthers.push(r.text);
                        }
                    });
                });
            });
            others = others.concat([...new Set(backupOthers)].sort(() => Math.random() - 0.5));
        }

        choices = choices.concat(others.slice(0, 3));
        choices.sort(() => Math.random() - 0.5);

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = choice;
            // ターゲットとの比較も新しい構造に合わせて変更
            btn.onclick = () => handleSelect(choice === target.text);
            container.appendChild(btn);
        });
    }

    function handleSelect(isCorrect) {
        if (isCorrect) correctScore++;
        qCount++;
        renderQuestion();
    }

    function run3MinTimer(seconds) {
        let remain = seconds;
        // 即時表示
        document.getElementById('timer-text').innerText = `残り時間 ${Math.floor(remain/60)}:${(remain%60).toString().padStart(2, '0')}`;
        timerInterval = setInterval(() => {
            remain--;
            const m = Math.floor(remain / 60);
            const s = remain % 60;
            document.getElementById('timer-text').innerText = `残り時間 ${m}:${s.toString().padStart(2, '0')}`;
            if (remain <= 0) endGame();
        }, 1000);
    }

    function runStopwatch() {
        timerInterval = setInterval(() => {
            const diff = (Date.now() - startTime) / 1000;
            document.getElementById('timer-text').innerText = `タイム: ${diff.toFixed(2)}s`;
        }, 50);
    }

    function endGame() {
        clearInterval(timerInterval);
        document.getElementById('screen-quiz').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');

        const label = document.getElementById('result-label');
        const display = document.getElementById('result-display');

        if (currentGameMode === '3min') {
            label.innerText = "3分間で解けた問題数：";
            display.innerText = `${correctScore} 問`;
        } else {
            const finalTime = (Date.now() - startTime) / 1000;
            label.innerText = "10問解くのにかかった時間：";
            display.innerText = `${finalTime.toFixed(2)} 秒`;
        }
    }

    function goHome() {
        location.href = location.pathname; 
    }

    // Android/PWAの戻るボタン対応
    window.addEventListener('popstate', (event) => {
        clearInterval(timerInterval);
        document.getElementById('screen-quiz').classList.add('hidden');
        document.getElementById('screen-result').classList.add('hidden');
        document.getElementById('screen-home').classList.remove('hidden');
    });

    // PWA Service Worker のモック登録 (オフラインキャッシュ用)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            // 実際の実装ではsw.jsを用意しますが、ここではダミー登録でインストール可能要件を満たします
            navigator.serviceWorker.register(`data:text/javascript,self.addEventListener('fetch',()=>null);`);
        });
    }
</script>
